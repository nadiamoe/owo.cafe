name: Build container image

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  publish:
    name: Build and push image
    strategy:
      matrix:
        image:
          - dockerfile: Dockerfile
            name: ${{ github.repository }}
          - dockerfile: Dockerfile.streaming
            name: ${{ github.repository }}-streaming
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        if: ${{ github.event_name != 'pull_request' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get Git commit timestamps
        id: commit-meta
        run: |-
          TIMESTAMP=$(git log -1 --pretty=%ct)
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "date3339=$(date --utc --rfc-3339=seconds -d "@$TIMESTAMP" | sed 's/ /T/')" >> $GITHUB_OUTPUT
      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          labels: |-
            org.opencontainers.image.created=${{ steps.commit-meta.outputs.date3339 }}
          annotations: |-
            manifest:org.opencontainers.image.created=${{ steps.commit-meta.outputs.date3339 }}
      - name: Extract Mastodon version
        id: version
        run: |
          echo "mastodon=$(sed -nr 's/^ARG MASTODON_VERSION="(.*)"$/\1/p' '${{ matrix.image.dockerfile }}')" >> "$GITHUB_OUTPUT"
      - name: Generate tag
        id: tag
        run: |
          echo "bare=${{ steps.version.outputs.mastodon }}" >> "$GITHUB_OUTPUT"
          # A more semver-correct way of generating this would be to use "+" rather than "sha.".
          # Unfortunately, image tags cannot contain "+".
          echo "full=${{ steps.version.outputs.mastodon }}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          file: ${{ matrix.image.dockerfile }}
          tags: |
            ghcr.io/${{ matrix.image.name }}:${{ steps.tag.outputs.bare }}
            ghcr.io/${{ matrix.image.name }}:${{ steps.tag.outputs.full }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Disable attestation so scheduled builds can yield exactly the same image if the source tree and remote files
          # do not change.
          provenance: false
          sbom: false
        env:
          SOURCE_DATE_EPOCH: ${{ steps.commit-meta.outputs.timestamp }}
